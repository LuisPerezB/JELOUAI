services:
  # ─────────────────────────────
  # BASE DE DATOS
  # ─────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: appuser
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────
  # CUSTOMERS API
  # ─────────────────────────────
  customers-api:
    build:
      context: ./customers-api
      dockerfile: Dockerfile
    container_name: ecommerce_customers
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: secret
      DB_NAME: ecommerce
      JWT_SECRET: supersecretkey
      JWT_EXPIRES_IN: 1h
      SERVICE_TOKEN: internal-service-secret
    ports:
      - "3001:3001"

  # ─────────────────────────────
  # ORDERS API
  # ─────────────────────────────
  orders-api:
    build:
      context: ./orders-api
      dockerfile: Dockerfile
    container_name: ecommerce_orders
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      customers-api:
        condition: service_started
    environment:
      PORT: 3002
      NODE_ENV: development
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: appuser
      DB_PASSWORD: secret
      DB_NAME: ecommerce
      JWT_SECRET: supersecretkey
      JWT_EXPIRES_IN: 1h
      CUSTOMERS_API_URL: http://customers-api:3001
      SERVICE_TOKEN: internal-service-secret
    ports:
      - "3002:3002"

volumes:
  mysql_data: