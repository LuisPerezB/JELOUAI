openapi: 3.0.3
info:
  title: Lambda Orchestrator
  description: |
    Orquestador que valida cliente, crea y confirma una orden en un solo request.
    Corre local con serverless-offline en http://localhost:3000.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local (serverless-offline)

components:
  schemas:
    OrchestratorRequest:
      type: object
      required: [customer_id, items, idempotency_key]
      properties:
        customer_id:
          type: integer
          example: 1
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [product_id, qty]
            properties:
              product_id: { type: integer, example: 2 }
              qty:        { type: integer, minimum: 1, example: 3 }
        idempotency_key:
          type: string
          example: "abc-123"
          description: Clave única para garantizar idempotencia en la confirmación
        correlation_id:
          type: string
          example: "req-789"
          description: ID de correlación opcional para trazabilidad

    OrchestratorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        correlationId:
          type: string
          nullable: true
          example: "req-789"
        data:
          type: object
          properties:
            customer:
              type: object
              properties:
                id:         { type: integer, example: 1 }
                name:       { type: string,  example: "Ana García" }
                email:      { type: string,  example: "ana@example.com" }
                phone:      { type: string,  example: "0991234567" }
                created_at: { type: string,  format: date-time }
            order:
              type: object
              properties:
                id:          { type: integer, example: 8 }
                status:      { type: string,  example: "CONFIRMED" }
                total_cents: { type: number,  example: 5997 }
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      id:               { type: integer, example: 12 }
                      product_id:       { type: integer, example: 2 }
                      product_name:     { type: string,  example: "Mouse Inalámbrico" }
                      sku:              { type: string,  example: "SKU002" }
                      qty:              { type: integer, example: 3 }
                      unit_price_cents: { type: number,  example: 1999 }
                      subtotal_cents:   { type: number,  example: 5997 }

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        correlationId:
          type: string
          nullable: true
        error:
          type: string
          example: "Mensaje de error"

paths:
  /orchestrator/create-and-confirm-order:
    post:
      summary: Crear y confirmar orden en un solo request
      description: |
        Flujo orquestado:
        1. Valida cliente en Customers API (`/internal/customers/:id`)
        2. Crea orden en Orders API (`POST /orders`)
        3. Confirma orden en Orders API (`POST /orders/:id/confirm`)
        4. Devuelve JSON consolidado con cliente + orden confirmada + items
      tags: [Orchestrator]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrchestratorRequest' }
            example:
              customer_id: 1
              items:
                - product_id: 2
                  qty: 3
              idempotency_key: "abc-123"
              correlation_id: "req-789"
      responses:
        '201':
          description: Orden creada y confirmada exitosamente
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OrchestratorResponse' }
              example:
                success: true
                correlationId: "req-789"
                data:
                  customer:
                    id: 1
                    name: "Ana García"
                    email: "ana@example.com"
                    phone: "0991234567"
                  order:
                    id: 8
                    status: "CONFIRMED"
                    total_cents: 5997
                    items:
                      - product_id: 2
                        product_name: "Mouse Inalámbrico"
                        sku: "SKU002"
                        qty: 3
                        unit_price_cents: 1999
                        subtotal_cents: 5997
        '400':
          description: Campos requeridos faltantes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '404':
          description: Cliente no encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '500':
          description: Error interno del orquestador
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }